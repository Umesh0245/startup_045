<svg viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="faviconLogoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <!-- A vivid splash coloring for the favicon using brand colors -->
            <stop offset="0%" stop-color="#4F46E5" />
            <stop offset="100%" stop-color="#EC4899" />
        </linearGradient>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Main SynVoke S logo path static and clear -->
    <path
        d="M30 20 H70 A20 20 0 0 1 70 60 H30 A20 20 0 0 0 30 100 H70"
        stroke="url(#faviconLogoGradient)"
        stroke-width="16"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
        filter="url(#glow)"
    />
</svg>
